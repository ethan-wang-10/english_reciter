<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能英语背诵系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <!-- 登录页面 -->
        <div id="login-page" class="page active">
            <div class="container">
                <div class="login-box">
                    <div class="login-brand">
                        <span class="login-mascot" aria-hidden="true">📚</span>
                        <h1>智能英语背诵</h1>
                        <p class="login-tagline">每天一点点，单词变简单</p>
                    </div>
                    <p class="login-sub">基于艾宾浩斯遗忘曲线的单词学习</p>
                    
                    <div class="tabs">
                        <button class="tab active" data-tab="login">登录</button>
                        <button class="tab" data-tab="register">注册</button>
                    </div>
                    
                    <!-- 登录表单 -->
                    <form id="login-form" class="auth-form">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" id="login-username" required>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">登录</button>
                    </form>
                    
                    <!-- 注册表单 -->
                    <form id="register-form" class="auth-form" style="display: none;">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" id="reg-username" required minlength="3" maxlength="32"
                                pattern="[a-zA-Z0-9_]{3,32}"
                                title="3-32位字母、数字或下划线">
                        </div>
                        <div class="form-group">
                            <label>邮箱（可选）</label>
                            <input type="email" id="reg-email">
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="reg-password" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label>确认密码</label>
                            <input type="password" id="reg-password-confirm" required>
                        </div>
                        <button type="submit" class="btn btn-primary">注册</button>
                    </form>
                    
                    <div id="auth-error" class="error-message"></div>
                </div>
            </div>
        </div>
        
        <!-- 主页面 -->
        <div id="main-page" class="page">
            <nav class="navbar">
                <div class="nav-brand">
                    <span class="logo">📚</span>
                    <span class="brand-name">智能英语背诵</span>
                </div>
                <div class="nav-menu">
                    <button class="nav-item active" data-page="review">今日复习</button>
                    <button class="nav-item" data-page="progress">学习进度</button>
                    <button class="nav-item" data-page="import">导入单词</button>
                    <button class="nav-item" data-page="mastered">已掌握</button>
                </div>
                <div class="nav-user">
                    <span id="username-display"></span>
                    <button id="logout-btn" class="btn btn-secondary">退出</button>
                </div>
            </nav>
            <div id="main-error-banner" class="main-error-banner" role="alert" style="display: none;"></div>
            
            <!-- 今日复习页面 -->
            <div id="review-section" class="section active">
                <div class="container">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">📝</div>
                            <div class="stat-content">
                                <div class="stat-label">今日待复习</div>
                                <div class="stat-value" id="review-count">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">✅</div>
                            <div class="stat-content">
                                <div class="stat-label">已掌握</div>
                                <div class="stat-value" id="mastered-count">0</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📊</div>
                            <div class="stat-content">
                                <div class="stat-label">当前轮次</div>
                                <div class="stat-value" id="round-count">0</div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="review-container" class="review-container">
                        <div id="review-box" class="review-box">
                            <div class="review-header">
                                <span class="word-english" id="current-word-english">apple</span>
                                <span class="word-progress" id="current-word-progress">3/8</span>
                            </div>
                            <div class="review-content">
                                <div class="word-chinese" id="current-word-chinese">苹果</div>
                                <div class="word-example-container">
                                    <span id="current-word-example">This is an example.</span>
                                    <button id="speak-example-btn" class="btn-speak" title="朗读例句">🔊</button>
                                </div>
                                <div class="word-input">
                                    <div class="underline-input-wrapper">
                                        <input type="text" id="mobile-word-capture" class="mobile-word-capture"
                                            inputmode="text" autocomplete="off" autocorrect="off"
                                            autocapitalize="off" spellcheck="false" aria-label="输入英文单词">
                                        <div id="underline-input" class="underline-input" tabindex="-1" aria-hidden="true"></div>
                                    </div>
                                    <button id="submit-answer" class="btn btn-primary">提交</button>
                                </div>
                                <div class="word-message" id="word-message"></div>
                            </div>
                        </div>
                        
                        <div id="review-complete" class="review-complete" style="display: none;">
                            <div class="complete-icon">🎉</div>
                            <h2>今日复习完成！</h2>
                            <p>你已经完成了今天的复习任务</p>
                            <button id="review-more" class="btn btn-secondary">继续学习</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 学习进度页面 -->
            <div id="progress-section" class="section">
                <div class="container">
                    <h2>学习进度</h2>
                    <div id="progress-stats" class="stats-grid"></div>
                    <div id="word-list" class="word-list"></div>
                </div>
            </div>
            
            <!-- 导入单词页面 -->
            <div id="import-section" class="section">
                <div class="container">
                    <h2>导入单词</h2>
                    <div class="import-box">
                        <div class="upload-area">
                            <input type="file" id="file-input" accept=".txt,.csv">
                            <div class="upload-icon">📄</div>
                            <p>点击或拖拽文件到此处</p>
                            <p class="upload-hint">文件格式：英文,中文（每行一个单词）</p>
                        </div>
                        <button id="import-btn" class="btn btn-primary">导入</button>
                    </div>
                    <div class="import-json-panel">
                        <h3 class="import-json-title">家长：粘贴 JSON 导入</h3>
                        <p class="import-json-desc">将学习数据 JSON 粘贴到下方，导入后会加入「待复习」词库（与已有单词英文重复则跳过）。</p>
                        <textarea id="import-json-textarea" class="import-json-textarea" rows="12"
                            spellcheck="false" placeholder='[ { "english": "apple", "chinese": "苹果", ... } ]'></textarea>
                        <button type="button" id="import-json-btn" class="btn btn-primary import-json-btn">导入 JSON</button>
                    </div>
                    <div id="import-message" class="message"></div>
                </div>
            </div>
            
            <!-- 已掌握页面 -->
            <div id="mastered-section" class="section">
                <div class="container">
                    <h2>已掌握单词</h2>
                    <div id="mastered-list" class="word-list"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
