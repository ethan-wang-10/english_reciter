version: '3.8'

services:
  web:
    build: .
    container_name: english-reciter
    ports:
      - "8000:8000"
    volumes:
      # 持久化用户数据
      - ./user_data:/app/user_data
      # 开发时可以挂载代码
      # - ./reciter.py:/app/reciter.py
      # - ./web_app.py:/app/web_app.py
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
